<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cozy Slots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background-color: #1e1e1e;
      color: #f4f4f4;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .mode-toggle {
      margin-bottom: 1rem;
    }

    button {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      margin: 0.25rem;
    }

    .cozy {
      background: linear-gradient(#2b2a26, #1f1e1b);
    }

    .neon {
      background: linear-gradient(#0f1020, #090914);
    }

    .slot-frame {
      width: 300px;
      border-radius: 16px;
      background-color: rgba(255,255,255,0.05);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .reels {
      display: flex;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .reel {
      width: 70px;
      height: 70px;
      font-size: 2rem;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    /* Win Highlight Effect */
    .win-glow {
      box-shadow: 0 0 20px #ffd700;
      transform: scale(1.1);
      background: rgba(255, 215, 0, 0.2);
      border: 2px solid #ffd700;
    }

    .spin-anim {
      animation: spin 0.3s linear infinite;
    }

    @keyframes spin {
      from { opacity: 0.3; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    #result {
      margin-top: 10px;
      min-height: 24px;
    }
  </style>
</head>

<body>
  <div class="app cozy" id="app">

    <div class="mode-toggle">
      <button onclick="setMode('cozy')">Home Cozy</button>
      <button onclick="setMode('neon')">Neon Arcade</button>
    </div>

    <div class="slot-frame">

      <div id="reels" class="reels">
        <div class="reel" id="reel1">🍒</div>
        <div class="reel" id="reel2">🍒</div>
        <div class="reel" id="reel3">🍒</div>
      </div>

      <div>Credits: <span id="credits">10</span></div>
      <button onclick="spin()">Spin</button>
      <div id="result"></div>

    </div>

  </div>

<script>
function setMode(mode) {
  const app = document.getElementById("app");
  app.className = "app " + mode;
  localStorage.setItem("cozySlotsMode", mode);
}

const savedMode = localStorage.getItem("cozySlotsMode");
if (savedMode) {
  document.getElementById("app").className = "app " + savedMode;
}

let credits = 10;
document.getElementById("credits").textContent = credits;

const symbols = ["🍒", "🍋", "⭐", "🔔", "💎"];

const paylines = [
  [0,1,2],
  [0,0,0],
  [2,2,2],
  [0,1,2],
  [2,1,0],
  [1,0,1],
  [1,2,1],
  [0,1,1],
  [2,1,1]
];

const payouts = {
  "🍒": 3,
  "🍋": 4,
  "⭐": 5,
  "🔔": 8,
  "💎": 12
};

function spin() {
  if (credits <= 0) {
    document.getElementById("result").textContent = "Out of credits.";
    return;
  }

  // deduct credit
  credits--;
  document.getElementById("credits").textContent = credits;

  // reset visuals and show spinning text
  document.getElementById("result").textContent = "Spinning...";
  const r1 = document.getElementById("reel1");
  const r2 = document.getElementById("reel2");
  const r3 = document.getElementById("reel3");
  
  [r1, r2, r3].forEach(r => {
    r.classList.remove("win-glow");
    r.classList.add("spin-anim");
  });

  // Pre-calculate result grid
  const grid = [
    [rand(), rand(), rand()],
    [rand(), rand(), rand()],
    [rand(), rand(), rand()]
  ];

  // Logic flags for staggered stopping
  let r1Spinning = true;
  let r2Spinning = true;
  let r3Spinning = true;

  // Shuffle animation
  const shuffleInterval = setInterval(() => {
    if (r1Spinning) r1.textContent = rand();
    if (r2Spinning) r2.textContent = rand();
    if (r3Spinning) r3.textContent = rand();
  }, 100);

  // Staggered stop times (Total duration ~1.1s)
  
  // Reel 1 stops
  setTimeout(() => {
    r1Spinning = false;
    r1.classList.remove("spin-anim");
    r1.textContent = grid[1][0];
  }, 600);

  // Reel 2 stops
  setTimeout(() => {
    r2Spinning = false;
    r2.classList.remove("spin-anim");
    r2.textContent = grid[1][1];
  }, 850);

  // Reel 3 stops + calculation
  setTimeout(() => {
    r3Spinning = false;
    r3.classList.remove("spin-anim");
    r3.textContent = grid[1][2];
    clearInterval(shuffleInterval);

    let totalWin = 0;
    let winLines = 0;

    for (const line of paylines) {
      const a = grid[line[0]][0];
      const b = grid[line[1]][1];
      const c = grid[line[2]][2];

      if (a === b && b === c) {
        totalWin += payouts[a];
        winLines++;
      }
    }

    if (totalWin > 0) {
      credits += totalWin;
      document.getElementById("credits").textContent = credits;
      document.getElementById("result").textContent =
        `WIN! ${winLines} line(s) — +${totalWin} credits`;
      
      // Add win feedback
      [r1, r2, r3].forEach(r => r.classList.add("win-glow"));
    } else {
      document.getElementById("result").textContent = "No win.";
    }

  }, 1100);
}

function rand() {
  return symbols[Math.floor(Math.random() * symbols.length)];
}
</script>

</body>
</html>
